spring.application.name=healthcare-backend
server.port=8081

# MySQL Database Configuration
# NOTE: Update the database name 'healthcare_db', username 'root', and password 'root' as per your local MySQL setup.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/healthcare_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:VaRuN2027@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Configuration
# 'update' automatically creates/updates database tables based on your entity classes.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true